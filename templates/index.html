<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作日志生成器</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <h1>工作日志生成器</h1>
        <div class="header-actions">
            <button id="btn-settings" title="设置">⚙</button>
        </div>
    </header>

    <main class="main">
        <!-- 输入区 -->
        <section class="input-panel">
            <div class="form-group">
                <label>📅 日期</label>
                <input type="date" id="log-date" class="input">
            </div>

            <div class="form-group">
                <label>📝 今日工作要点</label>
                <textarea id="work-points" class="textarea" rows="10"
                    placeholder="描述今天发生的事情，例如：&#10;1. 上午在基地测量了青瓜株高和叶面积&#10;2. 下午参加了周组会&#10;3. 晚上整理了实验数据"></textarea>
            </div>

            <div class="form-group">
                <label>📎 素材文件（选填）</label>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="file-input" multiple hidden
                        accept=".jpg,.jpeg,.png,.webp,.gif,.pdf,.pptx,.docx,.xlsx,.txt,.m4a,.mp3,.wav,.flac,.ogg">
                    <div class="upload-hint" id="upload-hint">
                        拖拽文件到此处，或点击选择
                    </div>
                    <ul class="file-list" id="file-list"></ul>
                </div>
            </div>

            <button id="btn-generate" class="btn-primary">✨ 生成日志</button>
            <button id="btn-regenerate" class="btn-secondary" style="display:none">🔄 重新生成</button>

            <div class="form-group" style="margin-top:24px">
                <button id="btn-toggle-logs" class="btn-secondary" style="width:100%">📋 历史日志</button>
                <div id="logs-list" style="display:none;margin-top:8px"></div>
            </div>
        </section>

        <!-- 预览区 -->
        <section class="preview-panel">
            <div id="preview-empty" class="preview-placeholder">
                点击"生成日志"，AI 将在这里生成今日工作日志
            </div>
            <div id="work-points-header" class="work-points-header" style="display:none">
                <div class="work-points-label">📝 当日工作要点</div>
                <div class="work-points-text" id="work-points-text"></div>
            </div>
            <div id="preview-content" class="preview-content" style="display:none"></div>
            <div class="preview-actions" id="preview-actions" style="display:none">
                <button id="btn-edit" class="btn-secondary">✏ 编辑</button>
                <button id="btn-copy" class="btn-primary">📋 一键复制</button>
                <button id="btn-save" class="btn-secondary">💾 保存</button>
            </div>
        </section>
    </main>

    <!-- 设置弹窗 -->
    <dialog id="settings-dialog">
        <h2>设置</h2>

        <h3>DeepSeek AI</h3>
        <div class="form-group">
            <label>API Key</label>
            <input type="password" id="setting-apikey" class="input" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>Base URL</label>
            <input type="text" id="setting-baseurl" class="input" placeholder="https://api.deepseek.com">
        </div>

        <hr>

        <h3>语音转文字 (ASR)</h3>
        <div class="form-group">
            <label>提供商</label>
            <select id="setting-asr-provider" class="input">
                <option value="">— 未配置 —</option>
                <option value="aliyun">阿里云语音识别</option>
                <option value="tencent">腾讯云语音识别</option>
            </select>
        </div>

        <div id="asr-aliyun-fields" style="display:none">
            <div class="form-group">
                <label>AppKey</label>
                <input type="text" id="setting-asr-app-key" class="input" placeholder="阿里云 AppKey">
            </div>
            <div class="form-group">
                <label>AccessKey ID</label>
                <input type="text" id="setting-asr-access-key-id" class="input" placeholder="阿里云 AccessKey ID">
            </div>
            <div class="form-group">
                <label>AccessKey Secret</label>
                <input type="password" id="setting-asr-access-key-secret" class="input" placeholder="阿里云 AccessKey Secret">
            </div>
        </div>

        <div id="asr-tencent-fields" style="display:none">
            <div class="form-group">
                <label>Secret ID</label>
                <input type="text" id="setting-asr-secret-id" class="input" placeholder="腾讯云 SecretId">
            </div>
            <div class="form-group">
                <label>Secret Key</label>
                <input type="password" id="setting-asr-secret-key" class="input" placeholder="腾讯云 SecretKey">
            </div>
        </div>

        <hr>

        <h3>腾讯云 COS（多设备同步）</h3>
        <div class="form-group">
            <label>Secret ID</label>
            <input type="text" id="setting-cos-secret-id" class="input" placeholder="COS SecretId">
        </div>
        <div class="form-group">
            <label>Secret Key</label>
            <input type="password" id="setting-cos-secret-key" class="input" placeholder="COS SecretKey">
        </div>
        <div class="form-group">
            <label>区域</label>
            <input type="text" id="setting-cos-region" class="input" placeholder="ap-guangzhou">
        </div>
        <div class="form-group">
            <label>存储桶</label>
            <input type="text" id="setting-cos-bucket" class="input" placeholder="example-1250000000">
        </div>

        <div class="dialog-actions">
            <button id="btn-settings-save" class="btn-primary">保存</button>
            <button id="btn-settings-cancel" class="btn-secondary">取消</button>
        </div>
    </dialog>

    <script src="/static/app.js"></script>
</body>
</html>
